<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jota Co">
<meta name="theme-color" content="#111318">
<title>Jota Co — Central Comercial</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f5f7;--bg2:#ffffff;--bg3:#f0f1f5;--bg4:#e8eaef;--bg5:#d8dae3;
  --b1:rgba(0,0,0,0.07);--b2:rgba(0,0,0,0.12);--b3:rgba(0,0,0,0.20);
  --text:#111827;--text2:#4b5563;--text3:#9ca3af;
  --blue:#1d6fdb;--blue2:#1558b8;--bluebg:rgba(29,111,219,0.08);--blueb:rgba(29,111,219,0.22);
  --green:#0e9964;--gnbg:rgba(14,153,100,0.08);--gnb:rgba(14,153,100,0.22);
  --amber:#b45309;--ambg:rgba(180,83,9,0.08);--amb:rgba(180,83,9,0.22);
  --red:#dc2626;--rdbg:rgba(220,38,38,0.08);--rdb:rgba(220,38,38,0.22);
  --r:10px;--rl:16px;
  --nav-h:68px;--top-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:16px;line-height:1.55;overscroll-behavior:none;}

/* ── TOPBAR (desktop) ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:var(--top-h);padding:0 24px;
  background:rgba(255,255,255,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.tlogo{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--blue);letter-spacing:.04em;white-space:nowrap;}
.tlogo span{color:var(--text3);}
.tnav{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;flex:1;justify-content:center;}
.tnav::-webkit-scrollbar{display:none;}
.nbtn{padding:6px 15px;border-radius:7px;border:none;background:transparent;color:var(--text2);font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;}
.nbtn:hover{background:var(--bg3);color:var(--text);}
.nbtn.active{background:var(--bluebg);color:var(--blue);border:1px solid var(--blueb);}
.tbadge{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--blue);background:var(--bluebg);border:1px solid var(--blueb);border-radius:5px;padding:4px 10px;letter-spacing:.04em;white-space:nowrap;}

/* ── BOTTOM NAV (mobile) ── */
.bottomnav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  height:var(--nav-h);
  background:rgba(255,255,255,0.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--b1);
  padding-bottom:env(safe-area-inset-bottom);
}
.bntabs{display:flex;height:100%;}
.bntab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;border:none;background:transparent;color:var(--text3);
  cursor:pointer;transition:color .15s;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  padding:0 2px;
}
.bntab svg{width:24px;height:24px;stroke-width:1.7;}
.bntab.active{color:var(--blue);}
.bntab.active svg path,.bntab.active svg rect,.bntab.active svg circle,.bntab.active svg line,.bntab.active svg polyline,.bntab.active svg polygon{stroke:var(--blue);}

/* ── MORE PANEL ── */
.morepanel{
  display:none;position:fixed;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));left:0;right:0;z-index:99;
  background:#ffffff;border-top:1px solid var(--b1);padding:6px 0 10px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.08);
}
.morepanel.open{display:block;}
.mpitem{display:flex;align-items:center;gap:14px;padding:14px 22px;cursor:pointer;color:var(--text2);font-size:16px;font-weight:500;transition:background .15s;}
.mpitem:hover,.mpitem:active{background:var(--bg3);}
.mpitem.active{color:var(--blue2);}
.mpitem svg{width:20px;height:20px;stroke-width:1.7;flex-shrink:0;}

/* ── MAIN ── */
.main{
  padding:calc(var(--top-h) + 24px) 24px 36px;
  max-width:1120px;margin:0 auto;
  min-height:100vh;
}

/* ── PAGE HEADER ── */
.sh{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap;}
.st{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.03em;line-height:1.1;}
.ss{font-size:12px;color:var(--text3);margin-top:5px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;}

/* ── METRIC GRID ── */
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px;}
.mc{
  background:#ffffff;border:1px solid var(--b1);border-radius:var(--rl);
  padding:20px 18px;transition:border-color .2s;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.mc.blue{border-color:var(--blueb);background:linear-gradient(135deg,#f0f6ff 0%,#e8f0ff 100%);}
.ml{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:10px;}
.mv{font-size:30px;font-weight:700;color:var(--text);line-height:1;font-family:'Space Mono',monospace;letter-spacing:-.02em;}
.mv.blue{color:var(--blue);}
.ms{font-size:13px;color:var(--text3);margin-top:6px;font-weight:500;}

/* ── CARD ── */
.card{background:#ffffff;border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--b1);background:var(--bg3);}
.card-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.09em;}
.card-body{padding:0 20px;}

/* ── ROW ── */
.dr{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid var(--b1);gap:12px;}
.dr:last-child{border-bottom:none;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;}
.bg{background:var(--gnbg);color:var(--green);border:1px solid var(--gnb);}
.ba{background:var(--ambg);color:var(--amber);border:1px solid var(--amb);}
.br{background:var(--rdbg);color:var(--red);border:1px solid var(--rdb);}
.bb{background:var(--bluebg);color:var(--blue2);border:1px solid var(--blueb);}
.bgray{background:var(--bg4);color:var(--text2);border:1px solid var(--b2);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r);border:1px solid var(--b2);background:transparent;color:var(--text2);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn:hover{background:var(--bg3);color:var(--text);border-color:var(--b3);}
.btnp{background:var(--blue);color:#fff;border-color:transparent;}
.btnp:hover{background:var(--blue2);color:#fff;}
.btns{padding:7px 12px;font-size:12px;}

/* ── PROGRESS BAR ── */
.pbar{flex:1;height:6px;background:var(--bg5);border-radius:999px;overflow:hidden;min-width:60px;}
.pfill{height:100%;border-radius:999px;transition:width .9s cubic-bezier(.4,0,.2,1);}

/* ── SECTION LABEL ── */
.slabel{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin:22px 0 12px;display:flex;align-items:center;gap:10px;}
.slabel::after{content:'';flex:1;height:1px;background:var(--b1);}

/* ── TABLE ── */
.vtab{width:100%;border-collapse:collapse;font-size:14px;}
.vtab th{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:700;padding:11px 14px;text-align:left;border-bottom:1px solid var(--b1);background:var(--bg3);white-space:nowrap;color:var(--text2);}
.vtab td{padding:13px 14px;border-bottom:1px solid var(--b1);color:var(--text2);vertical-align:middle;}
.vtab td:first-child{color:var(--text);}
.vtab tr:last-child td{border-bottom:none;}
.vtab tbody tr{transition:background .15s;}
.vtab tbody tr:hover td{background:var(--bg3);}

/* ── AVATAR ── */
.av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:.02em;font-family:'Space Mono',monospace;}

/* ── MODAL ── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;padding:0;}
.mo.open{display:flex;}
.modal{background:#ffffff;border:1px solid var(--b1);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--b1);}
.mtit{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.01em;}
.mclose{background:none;border:none;color:var(--text3);cursor:pointer;font-size:26px;line-height:1;transition:color .15s;padding:0 4px;}
.mclose:hover{color:var(--text);}
.mbody{padding:18px 22px;}
.mfoot{display:flex;gap:10px;justify-content:flex-end;padding:16px 22px;border-top:1px solid var(--b1);}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fgg{display:flex;flex-direction:column;gap:6px;}
.fgg.full{grid-column:1/-1;}
.fl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;font-weight:700;}
.fi,.fs,.fta{background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:15px;padding:11px 14px;outline:none;width:100%;transition:border-color .15s;-webkit-appearance:none;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--blue);}
.fta{resize:vertical;min-height:80px;}
.fs{appearance:none;-webkit-appearance:none;cursor:pointer;}

/* ── REPORT BLOCK ── */
.rb{border-left:3px solid var(--blue);padding:14px 16px;margin-bottom:12px;background:var(--bg3);border-radius:0 var(--r) var(--r) 0;}
.rbt{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.rbb{font-size:15px;color:var(--text2);line-height:1.7;}

/* ── DELIVERY ── */
.del-month{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.1em;padding:10px 20px;background:var(--bg3);border-bottom:1px solid var(--b1);}

/* ── RITUAL DAY ── */
.rday{font-size:10px;font-weight:700;min-width:56px;color:var(--blue);background:var(--bluebg);border:1px solid var(--blueb);padding:5px 8px;border-radius:5px;text-align:center;letter-spacing:.06em;font-family:'Space Mono',monospace;}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--nav-h) + 14px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);border:1px solid var(--b3);border-radius:var(--r);padding:12px 22px;font-size:14px;color:#fff;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;font-weight:600;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── MONO ── */
.mono{font-family:'Space Mono',monospace;font-weight:700;}

/* ── VALUE HIGHLIGHT ── */
.vval{font-family:'Space Mono',monospace;font-weight:700;font-size:17px;color:var(--text);}
.vval.green{color:var(--green);}
.vval.blue{color:var(--blue);}
.vval.amber{color:var(--amber);}

/* ── SLABEL ── */

/* ── SCROLL TABLE WRAP ── */
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tscroll::-webkit-scrollbar{height:3px;}
.tscroll::-webkit-scrollbar-track{background:transparent;}
.tscroll::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}

/* ── OVERLAY ── */
.overlay{display:none;position:fixed;inset:0;z-index:98;background:transparent;}
.overlay.open{display:block;}

/* ── NAME + SUB ── */
.iname{font-size:15px;font-weight:700;color:var(--text);}
.isub{font-size:12px;color:var(--text3);margin-top:3px;}
.inext{font-size:12px;color:var(--blue2);margin-top:4px;}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .topbar{display:none;}
  .bottomnav{display:block;}
  .main{padding:18px 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 20px);}
  .mgrid{grid-template-columns:repeat(2,1fr);}
  .st{font-size:22px;}
  .mv{font-size:26px;}
  .vtab{font-size:13px;}
  .vtab th{font-size:10px;}
  .vtab th,.vtab td{padding:10px 12px;}
  .mo{padding:0;align-items:flex-end;}
  .modal{border-radius:20px 20px 0 0;}
  .fg{grid-template-columns:1fr;}
  .fgg.full{grid-column:1;}
  .vval{font-size:16px;}
  .iname{font-size:14px;}
  .card-body{padding:0 16px;}
  .dr{padding:14px 0;}
}
@media(min-width:641px){
  .mo{padding:24px;align-items:center;}
  .modal{max-width:540px;border-radius:var(--rl);}
  .toast{bottom:24px;}
}
@media(max-width:380px){
  .mv{font-size:22px;}
  .mgrid{gap:8px;}
  .mc{padding:16px 14px;}
}
</style>
</head>
<body>

<!-- ── TOPBAR (desktop) ── -->
<div class="topbar">
  <div class="tlogo">JOTA<span>/</span>CO</div>

        </div>

        <div class="fgg"><label class="fl">Estágio</label>
          <select class="fs" id="pe"><option>Prospecção</option><option>Em Negociação</option><option>Proposta Enviada</option><option>Em Contrato</option><option>Aguardando Decisão</option><option>Fechado</option><option>Perdido</option></select>
        </div>
        <div class="fgg"><label class="fl">Probabilidade (%)</label><input class="fi" id="pp" type="number" min="0" max="100" placeholder="70"></div>
        <div class="fgg"><label class="fl">Responsável</label>
          <select class="fs" id="pr"><option>Grasi</option><option>Emily</option><option>Kathleen</option><option>Rafael</option><option>Joel</option></select>
        </div>
        <div class="fgg"><label class="fl">Previsão fechamento</label><input class="fi" id="pd" type="date"></div>
        <div class="fgg full"><label class="fl">Próximo passo</label><input class="fi" id="pnext" placeholder="Ex: Reunião segunda-feira"></div>
        <div class="fgg full"><label class="fl">Observações</label><textarea class="fta" id="pobs"></textarea></div>
      </div>
    </div>
    <div class="mfoot"><button class="btn" onclick="closeM('mp')">Cancelar</button><button class="btn btnp" onclick="savePip()">Salvar</button></div>
  </div>
</div>

<!-- ── MODAL CLIENTE ── -->
<div class="mo" id="mcli">
  <div class="modal">
    <div class="mhead"><div class="mtit">Cliente ativo</div><button class="mclose" onclick="closeM('mcli')">×</button></div>
    <div class="mbody">
      <div class="fg">
        <div class="fgg full"><label class="fl">Nome / Empresa</label><input class="fi" id="cn"></div>
        <div class="fgg"><label class="fl">BU</label>
          <select class="fs" id="cb"><option>PUBLICIDADE</option><option>ADVISORY</option><option>SELETO</option><option>PALESTRAS</option><option>JOTA LAB</option><option>JOTA EDITION</option><option>A TRINCA MÍDIA</option></select>
        </div>
        <div class="fgg"><label class="fl">Valor contrato (R$)</label><input class="fi" id="cv" type="number"></div>
        <div class="fgg"><label class="fl">Status</label>
          <select class="fs" id="cs"><option>Em entrega</option><option>No prazo</option><option>Atenção</option><option>Atrasado</option><option>Concluído</option></select>
        </div>
        <div class="fgg"><label class="fl">Responsável</label>
          <select class="fs" id="cres"><option>Grasi</option><option>Emily</option><option>Kathleen</option><option>Rafael</option><option>Maria Alves</option></select>
        </div>
        <div class="fgg"><label class="fl">Próxima entrega</label><input class="fi" id="cdat" type="date"></div>
        <div class="fgg full"><label class="fl">Entregas</label><textarea class="fta" id="cent"></textarea></div>
      </div>
    </div>
    <div class="mfoot"><button class="btn" onclick="closeM('mcli')">Cancelar</button><button class="btn btnp" onclick="saveCli()">Salvar</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

let moreOpen=false;

function handleMobileTab(id){
  if(id==='more'){
    moreOpen=!moreOpen;
    document.getElementById('morepanel').classList.toggle('open',moreOpen);
    document.getElementById('overlay').classList.toggle('open',moreOpen);
    // toggle active state of more button
    document.querySelectorAll('.bntab').forEach(b=>b.classList.remove('active'));
    if(moreOpen) document.querySelector('.bntab[data-p="more"]').classList.add('active');
  } else {
    closeMore();
    showP(id);
  }
}

function selectMore(id){
  closeMore();
  showP(id);
}

function closeMore(){
  moreOpen=false;
  document.getElementById('morepanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

let currentPanel='overview';
function showP(id){
  currentPanel=id;
  // Render
  const mc=document.getElementById('mc');
  if(id==='overview') mc.innerHTML=renderOv();
  else if(id==='pipeline') mc.innerHTML=renderPip();
  else if(id==='vendas') mc.innerHTML=renderVendas();
  else if(id==='advisory') mc.innerHTML=renderAdvisory();
  else if(id==='seleto') mc.innerHTML=renderSeleto();
  else if(id==='clientes') mc.innerHTML=renderCli();
  else if(id==='time') mc.innerHTML=renderTime();
  else if(id==='reporte') mc.innerHTML=renderReport();
  // Update desktop nav
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.toggle('active',b.dataset.p===id));
  // Update mobile nav
  document.querySelectorAll('.bntab').forEach(b=>{
    const isMore=MORE_ITEMS.some(m=>m.id===id)&&b.dataset.p==='more';
    b.classList.toggle('active', b.dataset.p===id||isMore);
  });
  document.querySelectorAll('.mpitem').forEach(b=>b.classList.toggle('active',b.dataset.p===id));
  // Animate after render
  if(id==='overview') setTimeout(animBars,80);
  // Scroll to top
  window.scrollTo(0,0);
}

function fmt(n){if(n>=1000000)return (n/1000000).toFixed(1).replace('.',',')+' M';if(n>=1000)return (n/1000).toFixed(0)+'k';return n.toLocaleString('pt-BR');}
function fmtFull(n){return 'R$ '+n.toLocaleString('pt-BR');}
function fmtD(d){if(!d)return '';const p=d.split('-');return `${p[2]}/${p[1]}`;}
function pctBar(pct,color){return `<div class="pbar"><div class="pfill" data-w="${pct}" style="width:0%;background:${color}"></div></div>`;}
function animBars(){document.querySelectorAll('.pfill[data-w]').forEach(el=>el.style.width=el.dataset.w+'%');}

function renderOv(){
  const m=db.metas;
  const tMeta=Object.values(m).reduce((a,b)=>a+b.meta,0);
  const tReal=Object.values(m).reduce((a,b)=>a+b.real,0);
  const pct=Math.round(tReal/tMeta*100);
  const pipAt=db.pip.filter(p=>!['Fechado','Perdido'].includes(p.e));
  const pipV=pipAt.reduce((a,b)=>a+(+b.v||0),0);
  const totalCli=31+db.cli.length;

  const buRows=Object.entries(m).map(([bu,d])=>{
    const p=Math.min(Math.round(d.real/d.meta*100),100);
    const clr=d.real>=d.meta?'#0e9964':p>=40?'#1d6fdb':'#dc2626';
    const badge=d.real>=d.meta?'<span class="badge bg">Meta ✓</span>':p>=40?'<span class="badge bb">Em dia</span>':'<span class="badge br">Risco</span>';
    return `<div class="dr">
      <div style="flex:1;min-width:0">
        <div class="iname">${bu}</div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
          ${pctBar(p,clr)}
          <div style="font-size:13px;font-weight:700;color:${clr};min-width:36px;font-family:'Space Mono',monospace">${p}%</div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:14px">
        <div class="vval">R$${fmt(d.real)}</div>
        <div style="font-size:12px;color:var(--text3);font-family:'Space Mono',monospace;margin-top:3px">de R$${fmt(d.meta)}</div>
        <div style="margin-top:5px">${badge}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="sh">
    <div><div class="st">Visão Geral</div><div class="ss">2026 · Atualizado Semana 15</div></div>
    <button class="btn btns" onclick="openEditMetas()">Editar</button>

function renderHistorico(){
  const mesesRealizados=['Janeiro','Fevereiro','Março','Abril'];
  const buOrder=['PUBLICIDADE','ADVISORY','PALESTRAS','CLUBES SÓCIOS','JOTA LAB','JOTA EDITION','A TRINCA MÍDIA','ADSENSE'];

  const blocos=mesesRealizados.map(mes=>{
    const vendMes={};
    VENDAS.filter(v=>v.mes===mes).forEach(v=>{vendMes[v.bu]=(vendMes[v.bu]||0)+v.v;});
    const totalReal=Object.values(vendMes).reduce((a,b)=>a+b,0);
    if(totalReal===0) return '';
    const metasMes=METAS_MENSAIS[mes]||{};
    const totalMeta=Object.values(metasMes).reduce((a,b)=>a+b,0);
    const pctTotal=totalMeta>0?Math.min(Math.round(totalReal/totalMeta*100),999):0;
    const pctClr=pctTotal>=100?'#0e9964':pctTotal>=40?'#1d6fdb':'#dc2626';

    const buItens=buOrder.filter(bu=>vendMes[bu]>0||(metasMes[bu]||0)>0).map(bu=>{
      const real=vendMes[bu]||0;
      const meta=metasMes[bu]||0;
      if(real===0&&meta===0) return '';
      const p=meta>0?Math.min(Math.round(real/meta*100),100):real>0?100:0;
      const clr=real>=meta?'#0e9964':p>=40?'#1d6fdb':'#dc2626';
      return `<tr>
        <td style="padding:7px 10px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--b2)">${bu}</td>
        <td style="padding:7px 10px;font-family:'Space Mono',monospace;font-size:13px;color:var(--text3);border-bottom:1px solid var(--b2);text-align:right">R$${fmt(meta)}</td>
        <td style="padding:7px 10px;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:${clr};border-bottom:1px solid var(--b2);text-align:right">R$${fmt(real)}</td>
        <td style="padding:7px 10px;border-bottom:1px solid var(--b2);text-align:right">
          <span style="font-size:12px;font-weight:700;color:${clr}">${p}%</span>
          <div style="height:3px;background:var(--b2);border-radius:2px;margin-top:4px;min-width:40px;overflow:hidden">
            <div style="height:3px;background:${clr};width:${p}%;border-radius:2px"></div>
          </div>
        </td>
      </tr>`;
    }).join('');

    return `<div style="margin-bottom:14px;border:1px solid var(--b2);border-radius:12px;overflow:hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg4)">
        <div style="font-size:15px;font-weight:800;color:var(--text)">${mes}</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="text-align:right">
            <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px">Realizado</div>
            <div style="font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:${pctClr}">R$${fmt(totalReal)}</div>
          </div>
          <div style="background:${pctClr};color:#fff;font-size:13px;font-weight:800;border-radius:8px;padding:4px 10px;font-family:'Space Mono',monospace">${pctTotal}%</div>
        </div>
      </div>
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="background:var(--bg2)">
            <th style="padding:6px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:left;border-bottom:1px solid var(--b2)">BU</th>
            <th style="padding:6px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:right;border-bottom:1px solid var(--b2)">Meta</th>
            <th style="padding:6px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:right;border-bottom:1px solid var(--b2)">Realizado</th>
            <th style="padding:6px 10px;font-size:11px;color:var(--text3);font-weight:600;text-align:right;border-bottom:1px solid var(--b2)">%</th>
          </tr>
        </thead>
        <tbody>${buItens}</tbody>
      </table>
    </div>`;
  }).join('');

  const totalAno=VENDAS.reduce((a,v)=>a+v.v,0);

  return `<div class="slabel">Histórico — Meses Realizados</div>
  <div style="margin-bottom:4px">${blocos}</div>
  <div style="background:var(--bg4);border:1px solid var(--b2);border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <div style="font-size:13px;font-weight:700;color:var(--text2)">Total Acumulado 2026</div>
    <div style="font-family:'Space Mono',monospace;font-size:18px;font-weight:800;color:var(--blue2)">R$${fmt(totalAno)}</div>
  </div>`;
}

      <div class="rbb" contenteditable="true" style="outline:none;min-height:40px;border-bottom:1px dashed var(--b2)">Edite aqui — decisões, aprovações ou abertura de portas necessárias.</div></div>
    <div class="rb"><div class="rbt">05 · Foco da próxima semana</div>
      <div class="rbb" contenteditable="true" style="outline:none;min-height:40px;border-bottom:1px dashed var(--b2)">Edite aqui — top 3 prioridades comerciais para a semana que vem.</div></div>

}
function copyR(){navigator.clipboard.writeText(document.getElementById('rcont').innerText).then(()=>showToast('Copiado!')).catch(()=>showToast('Selecione o texto manualmente'));}

// ══ UTILS ══
function closeM(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
